<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1.0" />
    <title>Admin Login — Spice Garden</title>
    <link rel="stylesheet" href="/css/admin.css" />
    <link rel="icon"
        href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🍛</text></svg>" />
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;800&family=Poppins:wght@400;500;600&display=swap');

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #0a0300 0%, #1a0800 40%, #2a1000 100%);
            font-family: 'Poppins', sans-serif;
            overflow: hidden;
            position: relative;
        }

        .blob {
            position: absolute;
            border-radius: 50%;
            filter: blur(80px);
            opacity: 0.5;
        }

        .blob-1 {
            width: 400px;
            height: 400px;
            background: rgba(232, 93, 4, 0.15);
            top: -100px;
            right: -100px;
        }

        .blob-2 {
            width: 350px;
            height: 350px;
            background: rgba(250, 163, 7, 0.08);
            bottom: -80px;
            left: -80px;
        }

        .admin-login-card {
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 28px;
            padding: 2.5rem;
            width: 100%;
            max-width: 420px;
            position: relative;
            z-index: 1;
            backdrop-filter: blur(20px);
            box-shadow: 0 30px 80px rgba(0, 0, 0, 0.5), 0 0 0 1px rgba(255, 255, 255, 0.05);
            animation: adminCardIn 0.7s cubic-bezier(0.34, 1.56, 0.64, 1) both;
        }

        @keyframes adminCardIn {
            from {
                opacity: 0;
                transform: translateY(40px) scale(0.95)
            }

            to {
                opacity: 1;
                transform: translateY(0) scale(1)
            }
        }

        .top-accent {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 3px;
            background: linear-gradient(90deg, #e85d04, #faa307, #e85d04);
            border-radius: 28px 28px 0 0;
            background-size: 200% auto;
            animation: shimmerBar 3s linear infinite;
        }

        @keyframes shimmerBar {
            0% {
                background-position: 0% center
            }

            100% {
                background-position: 200% center
            }
        }

        .admin-icon {
            width: 72px;
            height: 72px;
            background: linear-gradient(135deg, #e85d04, #faa307);
            border-radius: 22px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2.2rem;
            margin: 0 auto 1.2rem;
            box-shadow: 0 15px 40px rgba(232, 93, 4, 0.4);
            animation: iconPulse 2s ease-in-out infinite;
        }

        @keyframes iconPulse {

            0%,
            100% {
                box-shadow: 0 15px 40px rgba(232, 93, 4, 0.4)
            }

            50% {
                box-shadow: 0 15px 50px rgba(232, 93, 4, 0.6)
            }
        }

        h1 {
            font-family: 'Playfair Display', serif;
            font-size: 1.9rem;
            font-weight: 800;
            color: #fff;
            text-align: center;
            margin-bottom: 0.3rem;
        }

        .subtitle {
            color: rgba(255, 255, 255, 0.45);
            font-size: 0.85rem;
            text-align: center;
            margin-bottom: 2rem;
        }

        .form-group {
            display: flex;
            flex-direction: column;
            gap: 0.35rem;
            margin-bottom: 1rem;
        }

        .form-group label {
            font-size: 0.72rem;
            color: rgba(255, 255, 255, 0.5);
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.7px;
        }

        .form-group input {
            background: rgba(255, 255, 255, 0.06);
            border: 1.5px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            padding: 0.75rem 1rem;
            color: #fff;
            font-family: 'Poppins', sans-serif;
            font-size: 0.88rem;
            outline: none;
            transition: all 0.3s ease;
        }

        .form-group input:focus {
            border-color: #e85d04;
            background: rgba(232, 93, 4, 0.08);
            box-shadow: 0 0 0 4px rgba(232, 93, 4, 0.12);
        }

        .form-group input::placeholder {
            color: rgba(255, 255, 255, 0.25);
        }

        .btn-admin-login {
            width: 100%;
            background: linear-gradient(135deg, #e85d04, #c44d00);
            color: #fff;
            border: none;
            padding: 0.9rem;
            border-radius: 14px;
            font-size: 0.95rem;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s ease;
            font-family: 'Poppins', sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
            box-shadow: 0 8px 25px rgba(232, 93, 4, 0.4);
            margin-top: 0.5rem;
        }

        .btn-admin-login:hover {
            transform: translateY(-2px);
            box-shadow: 0 15px 40px rgba(232, 93, 4, 0.55);
        }

        .btn-admin-login:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        .form-error {
            background: rgba(239, 68, 68, 0.1);
            border: 1.5px solid rgba(239, 68, 68, 0.25);
            border-radius: 10px;
            padding: 0.7rem 1rem;
            font-size: 0.82rem;
            color: #fca5a5;
            margin-bottom: 1rem;
            display: none;
        }

        .form-error.show {
            display: block;
        }

        .back-link {
            display: block;
            text-align: center;
            margin-top: 1.2rem;
            color: rgba(255, 255, 255, 0.35);
            font-size: 0.8rem;
            text-decoration: none;
            transition: color 0.2s;
        }

        .back-link:hover {
            color: rgba(255, 255, 255, 0.7);
        }

        .admin-badge {
            display: inline-flex;
            align-items: center;
            gap: 0.4rem;
            background: rgba(232, 93, 4, 0.12);
            border: 1px solid rgba(232, 93, 4, 0.25);
            border-radius: 50px;
            padding: 0.3rem 0.8rem;
            font-size: 0.72rem;
            color: #fb923c;
            margin: 0 auto 1rem;
            font-weight: 600;
            display: flex;
            width: fit-content;
        }

        .toast-container {
            position: fixed;
            bottom: 2rem;
            right: 2rem;
            z-index: 9999;
            display: flex;
            flex-direction: column;
            gap: 0.7rem;
        }

        .toast {
            background: rgba(18, 7, 0, 0.95);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            padding: 0.9rem 1.3rem;
            display: flex;
            align-items: center;
            gap: 0.7rem;
            font-size: 0.82rem;
            min-width: 260px;
            color: #fff;
            animation: slideInRight 0.3s ease;
        }

        .toast.success {
            border-color: rgba(34, 197, 94, 0.3);
        }

        @keyframes slideInRight {
            from {
                opacity: 0;
                transform: translateX(40px)
            }

            to {
                opacity: 1;
                transform: translateX(0)
            }
        }

        @keyframes slideOutRight {
            from {
                opacity: 1;
                transform: translateX(0)
            }

            to {
                opacity: 0;
                transform: translateX(40px)
            }
        }
    </style>
</head>

<body>
    <div class="blob blob-1"></div>
    <div class="blob blob-2"></div>

    <div class="admin-login-card">
        <div class="top-accent"></div>
        <div class="admin-icon">🔐</div>
        <div class="admin-badge">🛡️ Admin Access Only</div>
        <h1>Admin Panel</h1>
        <p class="subtitle">Sign in to manage Spice Garden</p>

        <div class="form-error" id="loginError"></div>

        <form id="adminLoginForm">
            <div class="form-group">
                <label>Admin Email</label>
                <input type="email" id="loginEmail" placeholder="admin@spicegarden.com" value="admin@spicegarden.com"
                    required autofocus />
            </div>
            <div class="form-group">
                <label>Password</label>
                <input type="password" id="loginPassword" placeholder="Admin password" value="admin123" required />
            </div>
            <button type="submit" class="btn-admin-login" id="loginBtn">
                <span id="loginBtnText">🚀 Sign In to Admin</span>
            </button>
        </form>

        <a href="/" class="back-link">← Back to Spice Garden Website</a>
    </div>

    <div class="toast-container" id="toastContainer"></div>
    <script>
        function showToast(msg, type = 'info', icon = 'ℹ️') {
            const c = document.getElementById('toastContainer'), t = document.createElement('div');
            t.className = `toast ${type}`; t.innerHTML = `<span>${icon}</span><span>${msg}</span>`; c.appendChild(t);
            setTimeout(() => { t.style.animation = 'slideOutRight 0.3s ease forwards'; setTimeout(() => t.remove(), 300); }, 3500);
        }
        // Redirect if already admin
        const user = (() => { try { return JSON.parse(localStorage.getItem('sg_user')); } catch { return null; } })();
        if (user && user.role === 'admin') window.location.href = '/admin/dashboard.html';

        document.getElementById('adminLoginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const errEl = document.getElementById('loginError'); errEl.classList.remove('show');
            const btn = document.getElementById('loginBtn'), btnText = document.getElementById('loginBtnText');
            btnText.textContent = 'Authenticating...'; btn.disabled = true;
            try {
                const res = await fetch('/api/auth/login', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ email: document.getElementById('loginEmail').value, password: document.getElementById('loginPassword').value }) });
                const data = await res.json();
                if (!res.ok) { errEl.textContent = data.error; errEl.classList.add('show'); return; }
                if (data.user.role !== 'admin') { errEl.textContent = 'Access denied. This panel is for administrators only.'; errEl.classList.add('show'); return; }
                localStorage.setItem('sg_token', data.token);
                localStorage.setItem('sg_user', JSON.stringify(data.user));
                showToast('Welcome, Admin!', 'success', '✅');
                setTimeout(() => window.location.href = '/admin/dashboard.html', 700);
            } catch { errEl.textContent = 'Server error. Please try again.'; errEl.classList.add('show'); }
            finally { btnText.textContent = '🚀 Sign In to Admin'; btn.disabled = false; }
        });
    </script>
</body>

</html>
