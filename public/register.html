<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1.0" />
    <title>Register — Spice Garden</title>
    <link rel="stylesheet" href="/css/style.css" />
    <link rel="icon"
        href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🍛</text></svg>" />
</head>

<body>
    <div
        style="position:fixed;top:-150px;right:-100px;width:500px;height:500px;background:radial-gradient(circle,rgba(232,93,4,0.07),transparent 70%);border-radius:50%;pointer-events:none;">
    </div>
    <div class="auth-page">
        <div class="auth-card" style="max-width:500px;animation:zoomIn 0.6s cubic-bezier(0.34,1.56,0.64,1) both">
            <div style="margin-bottom:1.5rem"><a href="/user/login"
                    style="display:inline-flex;align-items:center;gap:0.4rem;color:var(--text-muted);text-decoration:none;font-size:0.82rem;font-weight:500;">←
                    Back to login</a></div>
            <div style="display:flex;flex-direction:column;align-items:center;margin-bottom:1.5rem">
                <div
                    style="width:60px;height:60px;background:linear-gradient(135deg,var(--primary),var(--secondary));border-radius:18px;display:flex;align-items:center;justify-content:center;font-size:1.8rem;margin-bottom:0.8rem;box-shadow:0 10px 30px rgba(232,93,4,0.3);">
                    🍛</div>
            </div>
            <h1 class="auth-title">Join Spice Garden</h1>
            <p class="auth-subtitle">Create an account to start ordering delicious food</p>
            <div class="form-error" id="regError"></div>
            <form class="auth-form" id="registerForm">
                <div class="form-row">
                    <div class="form-group"><label>Full Name *</label><input type="text" id="regName"
                            placeholder="Your full name" required autofocus /></div>
                    <div class="form-group"><label>Phone</label><input type="tel" id="regPhone"
                            placeholder="9876543210" /></div>
                </div>
                <div class="form-group"><label>Email Address *</label><input type="email" id="regEmail"
                        placeholder="you@email.com" required /></div>
                <div class="form-group"><label>Delivery Address</label><input type="text" id="regAddress"
                        placeholder="Your default address" /></div>
                <div class="form-row">
                    <div class="form-group"><label>Password *</label><input type="password" id="regPassword"
                            placeholder="Min 6 characters" required minlength="6" /></div>
                    <div class="form-group"><label>Confirm Password *</label><input type="password" id="regConfirm"
                            placeholder="Repeat password" required /></div>
                </div>
                <button type="submit" class="btn-primary w-full" id="regBtn"
                    style="justify-content:center;padding:0.9rem;margin-top:0.3rem;"><span id="regBtnText">Create
                        Account →</span></button>
            </form>
            <div class="auth-link">Already have an account? <a href="/user/login">Sign in here</a></div>
        </div>
    </div>
    <div class="toast-container" id="toastContainer"></div>
    <script>
        function showToast(msg, type = 'info', icon = 'ℹ️') { const c = document.getElementById('toastContainer'), t = document.createElement('div'); t.className = `toast ${type}`; t.innerHTML = `<span>${icon}</span><span>${msg}</span>`; c.appendChild(t); setTimeout(() => { t.style.animation = 'slideOutRight 0.4s ease forwards'; setTimeout(() => t.remove(), 400); }, 3500); }
        document.getElementById('registerForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const errEl = document.getElementById('regError'); errEl.classList.remove('show');
            const pw = document.getElementById('regPassword').value, cf = document.getElementById('regConfirm').value;
            if (pw !== cf) { errEl.textContent = 'Passwords do not match'; errEl.classList.add('show'); return; }
            const btn = document.getElementById('regBtn'), btnText = document.getElementById('regBtnText');
            btnText.textContent = 'Creating account...'; btn.disabled = true;
            try {
                const res = await fetch('/api/auth/register', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ name: document.getElementById('regName').value, email: document.getElementById('regEmail').value, password: pw, phone: document.getElementById('regPhone').value, address: document.getElementById('regAddress').value }) });
                const data = await res.json();
                if (!res.ok) { errEl.textContent = data.error; errEl.classList.add('show'); return; }
                localStorage.setItem('sg_token', data.token); localStorage.setItem('sg_user', JSON.stringify(data.user));
                showToast('Account created! Welcome to Spice Garden 🎉', 'success', '✅');
                setTimeout(() => window.location.href = '/', 1000);
            } catch { errEl.textContent = 'Server error. Please try again.'; errEl.classList.add('show'); }
            finally { btnText.textContent = 'Create Account →'; btn.disabled = false; }
        });
    </script>
</body>

</html>
