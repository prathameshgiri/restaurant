<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1.0" />
    <title>Login — Spice Garden</title>
    <link rel="stylesheet" href="/css/style.css" />
    <link rel="icon"
        href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🍛</text></svg>" />
</head>

<body>
    <div
        style="position:fixed;top:-200px;right:-200px;width:600px;height:600px;background:radial-gradient(circle,rgba(232,93,4,0.07),transparent 70%);border-radius:50%;pointer-events:none;">
    </div>
    <div
        style="position:fixed;bottom:-200px;left:-200px;width:500px;height:500px;background:radial-gradient(circle,rgba(245,156,0,0.06),transparent 70%);border-radius:50%;pointer-events:none;">
    </div>

    <div class="auth-page">
        <div class="auth-card" style="animation:zoomIn 0.6s cubic-bezier(0.34,1.56,0.64,1) both">
            <div style="margin-bottom:1.5rem">
                <a href="/"
                    style="display:inline-flex;align-items:center;gap:0.4rem;color:var(--text-muted);text-decoration:none;font-size:0.82rem;font-weight:500;">←
                    Back to website</a>
            </div>
            <div style="display:flex;flex-direction:column;align-items:center;margin-bottom:1.5rem">
                <div
                    style="width:64px;height:64px;background:linear-gradient(135deg,var(--primary),var(--secondary));border-radius:20px;display:flex;align-items:center;justify-content:center;font-size:2rem;margin-bottom:0.8rem;box-shadow:0 10px 30px rgba(232,93,4,0.3);">
                    🍛</div>
                <div style="font-family:'Playfair Display',serif;font-size:1.3rem;font-weight:700;color:var(--dark)">
                    Spice <span style="color:var(--primary)">Garden</span></div>
            </div>
            <h1 class="auth-title">Welcome Back!</h1>
            <p class="auth-subtitle">Sign in to order your favourite dishes &amp; track orders</p>

            <!-- Demo Credentials -->
            <div
                style="background:linear-gradient(135deg,rgba(232,93,4,0.07),rgba(245,156,0,0.07));border:1.5px solid rgba(232,93,4,0.2);border-radius:14px;padding:1rem 1.2rem;margin-bottom:1.2rem;">
                <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:0.6rem;">
                    <div style="display:flex;align-items:center;gap:0.5rem;">
                        <span style="font-size:1.1rem">👤</span>
                        <span style="font-weight:700;font-size:0.83rem;color:var(--primary)">Demo User Account</span>
                    </div>
                    <button onclick="fillDemo()"
                        style="background:var(--primary);color:#fff;border:none;border-radius:8px;padding:0.35rem 0.8rem;font-size:0.72rem;font-weight:700;cursor:pointer;font-family:'Poppins',sans-serif;">Auto
                        Fill ↓</button>
                </div>
                <div style="display:grid;grid-template-columns:auto 1fr;gap:0.25rem 0.8rem;font-size:0.82rem;">
                    <span style="color:var(--text-muted);font-weight:500;">Email</span>
                    <span style="font-weight:700;color:var(--dark);font-family:monospace;">user@spicegarden.com</span>
                    <span style="color:var(--text-muted);font-weight:500;">Password</span>
                    <span style="font-weight:700;color:var(--dark);font-family:monospace;">user123</span>
                </div>
            </div>

            <div class="form-error" id="loginError"></div>
            <form class="auth-form" id="loginForm">
                <div class="form-group">
                    <label>Email Address</label>
                    <input type="email" id="loginEmail" placeholder="you@email.com" required autofocus />
                </div>
                <div class="form-group">
                    <label>Password</label>
                    <input type="password" id="loginPassword" placeholder="Your password" required />
                </div>
                <button type="submit" class="btn-primary w-full" id="loginBtn"
                    style="justify-content:center;padding:0.9rem;margin-top:0.4rem;">
                    <span id="loginBtnText">Sign In →</span>
                </button>
            </form>
            <div
                style="margin-top:1rem;text-align:center;background:rgba(0,0,0,0.03);border:1.5px solid rgba(0,0,0,0.06);border-radius:12px;padding:0.75rem;font-size:0.8rem;color:var(--text-muted);">
                🛡️ Admin? <a href="/admin/login" style="color:var(--primary);font-weight:700;text-decoration:none;">Go
                    to
                    Admin Panel →</a>
            </div>
            <div class="auth-link">Don't have an account? <a href="/register">Register here</a></div>
        </div>
    </div>
    <div class="toast-container" id="toastContainer"></div>
    <script>
        function showToast(msg, type = 'info', icon = 'ℹ️') {
            const c = document.getElementById('toastContainer'), t = document.createElement('div');
            t.className = `toast ${type}`; t.innerHTML = `<span>${icon}</span><span>${msg}</span>`; c.appendChild(t);
            setTimeout(() => { t.style.animation = 'slideOutRight 0.4s ease forwards'; setTimeout(() => t.remove(), 400); }, 3500);
        }
        function fillDemo() {
            document.getElementById('loginEmail').value = 'user@spicegarden.com';
            document.getElementById('loginPassword').value = 'user123';
            showToast('Demo credentials filled! Click Sign In.', 'info', '👤');
        }
        const user = (() => { try { return JSON.parse(localStorage.getItem('sg_user')); } catch { return null; } })();
        if (user) { window.location.href = user.role === 'admin' ? '/admin/dashboard.html' : '/'; }

        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const errEl = document.getElementById('loginError'); errEl.classList.remove('show');
            const btn = document.getElementById('loginBtn'), btnText = document.getElementById('loginBtnText');
            btnText.textContent = 'Signing in...'; btn.disabled = true;
            try {
                const res = await fetch('/api/auth/login', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ email: document.getElementById('loginEmail').value, password: document.getElementById('loginPassword').value }) });
                const data = await res.json();
                if (!res.ok) { errEl.textContent = data.error; errEl.classList.add('show'); return; }
                if (data.user.role === 'admin') { errEl.textContent = 'Please use the Admin Panel to login as admin.'; errEl.classList.add('show'); return; }
                localStorage.setItem('sg_token', data.token); localStorage.setItem('sg_user', JSON.stringify(data.user));
                showToast(`Welcome back, ${data.user.name}! 🎉`, 'success', '✅');
                setTimeout(() => { window.location.href = new URLSearchParams(window.location.search).get('redirect') || '/'; }, 800);
            } catch { errEl.textContent = 'Server error. Please try again.'; errEl.classList.add('show'); }
            finally { btnText.textContent = 'Sign In →'; btn.disabled = false; }
        });
    </script>
</body>

</html>
